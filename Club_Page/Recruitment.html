<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandish - Audition Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #040208; color: #fff; font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .form-wrap {
            background: rgba(15, 10, 25, 0.7); border: 1px solid rgba(255,255,255,0.06);
            padding: 40px; border-radius: 24px; max-width: 600px; width: 100%; backdrop-filter: blur(20px);
        }
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 30px; text-align: center; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
        .group { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 2; }
        @media (max-width: 500px) { .full { grid-column: span 1; } }
        label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; }
        input, textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: #ff2a5f; box-shadow: 0 0 15px rgba(255, 42, 95, 0.2); }
        button {
            width: 100%; background: linear-gradient(90deg, #ff2a5f, #ff7e40); color: white;
            border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="form-wrap">
        <h2>Audition Registry Application</h2>
        <form onsubmit="event.preventDefault(); alert('Application sent successfully!'); this.reset();">
            <div class="row">
                <div class="group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="group">
                    <label>Scholar ID</label>
                    <input type="text" placeholder="0101ME2310XX" required>
                </div>
            </div>
            <div class="group full" style="margin-bottom: 20px;">
                <label>Musical Portfolio Summary</label>
                <textarea rows="4" placeholder="Tell us about your background or instruments..." required></textarea>
            </div>
            <button type="submit">Dispatch Audition File</button>
        </form>
    </div>
</body>
</html>

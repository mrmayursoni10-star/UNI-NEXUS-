<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandish - Trophies & Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #030303; color: #fff; font-family: 'Outfit', sans-serif; padding: 50px 20px; }
        .wrapper { max-width: 750px; margin: 0 auto; }
        h2 { font-family: 'Space Grotesk', sans-serif; text-align: center; margin-bottom: 40px; font-size: 2.2rem; }
        .row {
            display: flex; align-items: center; gap: 24px; padding: 25px;
            background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 18px; margin-bottom: 20px;
        }
        .badge {
            width: 65px; height: 65px; background: rgba(255, 215, 0, 0.08);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        .content h4 { font-size: 1.3rem; margin-bottom: 4px; font-weight: 600; }
        .content p { color: #a1a1aa; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Club Trophies & Records</h2>
        <div class="row">
            <div class="badge"><i class="fa-solid fa-trophy"></i></div>
            <div class="content">
                <h4>1st Position - State Cult-Fest '25</h4>
                <p>Our core band group secured the gold badge out of 45 contending institutional teams.</p>
            </div>
        </div>
        <div class="row">
            <div class="badge" style="color:#00f0ff; background:rgba(0,240,255,0.08); box-shadow:0 0 15px rgba(0,240,255,0.1);"><i class="fa-solid fa-award"></i></div>
            <div class="content">
                <h4>Best Sound Engineering Matrix</h4>
                <p>Awarded by Nexus Collective Network for exceptional live mix execution during Horizon '24.</p>
            </div>
        </div>
    </div>
</body>
</html>

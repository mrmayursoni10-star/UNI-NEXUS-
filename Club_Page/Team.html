<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandish - Core Members</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #06060c; color: #fff; font-family: 'Outfit', sans-serif; padding: 60px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h2 { font-family: 'Space Grotesk', sans-serif; text-align: center; margin-bottom: 50px; font-size: 2.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; }
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 30px; text-align: center; transition: all 0.3s;
        }
        .card:hover { background: rgba(255,255,255,0.04); border-color: #00ffcc; }
        .avatar {
            width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #1e1b4b, #311042);
            margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #00ffcc; border: 2px solid rgba(255,255,255,0.1);
        }
        .card h4 { font-size: 1.25rem; margin-bottom: 6px; }
        .card p { color: #00ffcc; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Active Core Roster</h2>
        <div class="grid">
            <div class="card">
                <div class="avatar"><i class="fa-solid fa-user-astronaut"></i></div>
                <h4>Aaryan Sharma</h4>
                <p>Lead Vocalist / President</p>
            </div>
            <div class="card">
                <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
                <h4>Ananya Iyer</h4>
                <p>Arranger / Vice President</p>
            </div>
            <div class="card">
                <div class="avatar"><i class="fa-solid fa-user-ninja"></i></div>
                <h4>Rohan Verma</h4>
                <p>Lead Guitarist / Technical</p>
            </div>
        </div>
    </div>
</body>
</html>

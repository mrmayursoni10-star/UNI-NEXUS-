<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandish - Upcoming Schedules</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #07070f;
            --accent: #00ffcc;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 50px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 40px; text-align: center; font-size: 2.2rem; }
        .timeline { position: relative; padding-left: 40px; }
        .timeline::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.05); }
        .node { position: relative; margin-bottom: 40px; }
        .node::before { content: ''; position: absolute; left: -26px; top: 6px; width: 14px; height: 14px; border-radius: 50%; background: var(--bg); border: 3px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        .date { font-family: 'Space Grotesk', sans-serif; color: var(--accent); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
        .box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 24px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .info h3 { font-size: 1.25rem; margin-bottom: 6px; }
        .info p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }
        .btn-remind { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 0.85rem; }
        .btn-remind:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upcoming Project Timelines</h1>
        <div class="timeline">
            <div class="node">
                <div class="date">June 15, 2026</div>
                <div class="box">
                    <div class="info">
                        <h3>Midsummer Jam Session</h3>
                        <p>An informal jam arena curated for incoming club applicants.</p>
                    </div>
                    <button class="btn-remind" onclick="alert('Notification alert locked in for June 15th!')">Remind Me</button>
                </div>
            </div>
            <div class="node">
                <div class="date">August 02, 2026</div>
                <div class="box">
                    <div class="info">
                        <h3>Bandish Fusion Labs v2</h3>
                        <p>Exploration session focusing on bridging traditional and modern synth tracks.</p>
                    </div>
                    <button class="btn-remind" onclick="alert('Notification alert locked in for August 2nd!')">Remind Me</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

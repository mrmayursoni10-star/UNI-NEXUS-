<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates | UNI~NEXUS</title>

<link rel="stylesheet" href="certificate.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR (YOUR FORMAT - NOT CHANGED) -->
<div class="navbar">

    <div></div> <!-- empty left space -->

    <div class="title">
        UNI~NEXUS
    </div>

    <div class="profile">
        <div class="avatar">M</div>
    </div>

</div>

<!-- MAIN CONTENT -->
<section class="certificates-page">

    <h2 class="page-heading">Your Certificates</h2>

    <div class="cert-grid">

        <!-- CARD -->
        <div class="cert-card">
            <div class="cert-top">
                <h3>Hackathon 2026</h3>
                <span class="status done">Completed</span>
            </div>

            <p>Issued: 12 Feb 2026</p>

            <div class="cert-buttons">
                <button class="view">View</button>
                <button class="download">Download</button>
            </div>
        </div>

        <!-- CARD -->
        <div class="cert-card">
            <div class="cert-top">
                <h3>AI Workshop</h3>
                <span class="status pending">Pending</span>
            </div>

            <p>Certificate not ready</p>

            <div class="cert-buttons">
                <button class="view disabled">View</button>
                <button class="download disabled">Download</button>
            </div>
        </div>

    </div>

</section>

</body>
</html>

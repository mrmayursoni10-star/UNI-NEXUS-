<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Club Registration | UNI-NEXUS</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="club_reg.css">
</head>

<body>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- LEFT INFO SECTION -->
        <div class="left-section">

            <div class="logo">
                <h1>UNI-NEXUS</h1>
            </div>

            <div class="info-content">

                <h2>Create Your Club</h2>

                <p>
                    Register your college club and automatically create
                    a dedicated club page for students.
                </p>

                <div class="info-boxes">

                    <div class="box">
                        <h3>Easy Setup</h3>
                        <span>Create your club in minutes</span>
                    </div>

                    <div class="box">
                        <h3>Club Visibility</h3>
                        <span>Reach more students easily</span>
                    </div>

                    <div class="box">
                        <h3>Manage Members</h3>
                        <span>Handle events and registrations</span>
                    </div>

                </div>

            </div>

        </div>



        <!-- RIGHT FORM SECTION -->
        <div class="right-section">

            <!-- TOP BAR -->
            <div class="top-bar">

                <button class="home-btn">Home</button>

                <div class="profile-icon">
                    M
                </div>

            </div>


            <!-- FORM CARD -->
            <div class="form-card">

                <h2>Club Registration</h2>

                <form>

                    <!-- ROW 1 -->
                    <div class="form-row">

                        <div class="input-group">
                            <label>Club Name</label>
                            <input type="text" placeholder="Enter club name">
                        </div>

                        <div class="input-group">
                            <label>Tagline</label>
                            <input type="text" placeholder="Enter tagline">
                        </div>

                    </div>


                    <!-- CLUB CATEGORY -->
                    <div class="input-group full-width">

                        <label>Club Category</label>

                        <select>
                            <option>Select Category</option>
                            <option>Technology & Coding</option>
                            <option>Cultural</option>
                            <option>Sports</option>
                            <option>Music</option>
                            <option>Photography</option>
                            <option>Entrepreneurship</option>
                        </select>

                    </div>


                    <!-- ROW 2 -->
                    <div class="form-row">

                        <div class="input-group">
                            <label>President / Admin</label>
                            <input type="text" placeholder="Enter name">
                        </div>

                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" placeholder="Enter email">
                        </div>

                    </div>


                    <!-- FACULTY COORDINATOR -->
                    <div class="input-group full-width">

                        <label>Faculty Coordinator</label>
                        <input type="text" placeholder="Faculty name">

                    </div>


                    <!-- LOGO UPLOAD -->
                    <div class="input-group full-width">

                        <label>Club Logo</label>

                        <div class="upload-box">

                            <input type="file">

                            <p>Drop Logo Here or Upload</p>

                        </div>

                    </div>


                    <!-- DESCRIPTION -->
                    <div class="input-group full-width">

                        <label>Description</label>

                        <textarea placeholder="Write about your club"></textarea>

                    </div>


                    <!-- SOCIAL LINKS -->
                    <div class="form-row">

                        <div class="input-group">
                            <label>Instagram</label>
                            <input type="text" placeholder="@clubpage">
                        </div>

                        <div class="input-group">
                            <label>Website</label>
                            <input type="text" placeholder="Website link">
                        </div>

                    </div>


                    <!-- SUBMIT BUTTON -->
                    <button type="submit" class="submit-btn">
                        Create Club
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
